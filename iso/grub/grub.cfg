set default="0"
set timeout="4"
set timeout_style="menu"

# Load necessary modules
insmod all_video
insmod gfxterm
insmod png

# AIOS theme
set gfxmode=auto
terminal_output gfxterm

# ── Menu entries ──────────────────────────────────────────────────────────────
menuentry "FELBIC OS — AI-Native Operating System (Live)" --class felbicos --class gnu-linux --class os {
    set archisobasedir=arch
    set archisolabel=FELBICOS_LIVE
    linuxefi /arch/boot/x86_64/vmlinuz-linux \
        archisobasedir=${archisobasedir} \
        archisolabel=${archisolabel} \
        quiet splash plymouth.enable=1 loglevel=3 \
        rd.systemd.show_status=false \
        rd.systemd.debug-shell=1 \
        rd.udev.log_level=3
    initrdefi \
        /arch/boot/x86_64/initramfs-linux.img
}

menuentry "FELBIC OS — Live (accessibility, no splash)" --class felbicos {
    set archisobasedir=arch
    set archisolabel=FELBICOS_LIVE
    linuxefi /arch/boot/x86_64/vmlinuz-linux \
        archisobasedir=${archisobasedir} \
        archisolabel=${archisolabel} \
        nomodeset loglevel=7 rd.systemd.debug-shell=1
    initrdefi \
        /arch/boot/x86_64/initramfs-linux.img
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
