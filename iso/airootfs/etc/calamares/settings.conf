# settings.conf — Calamares sequence for AIOS (FELBIC OS)
# Document specifies execution stages of the custom installer.
---
modules-search: [ local, /usr/lib/calamares/modules ]

instances:
  - id:       felbicos-ai-setup
    module:   felbicos-ai-setup
    config:   felbicos-ai-setup.conf
  - id:       felbicos-disk
    module:   felbicos-disk
    config:   felbicos-disk.conf

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - bootloader
    - felbicos-ai-setup
    - felbicos-disk
    - services-systemd
    - umount
  - show:
    - finished

branding: felbicos
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
