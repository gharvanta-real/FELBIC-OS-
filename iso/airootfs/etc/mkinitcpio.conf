# AIOS/FELBIC OS live initramfs configuration.
# Keep this in sync with /etc/mkinitcpio.conf.d/archiso.conf.
#
# PRD foundation requirement:
# - KMS comes up early for Plymouth/Wayland handoff.
# - archiso hooks stay intact so the live medium is discoverable.
# - Keyboard/filesystem hooks remain available for recovery and real hardware.

HOOKS=(base udev microcode modconf kms memdisk archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs block filesystems keyboard)

COMPRESSION="xz"
COMPRESSION_OPTIONS=(-9e)
