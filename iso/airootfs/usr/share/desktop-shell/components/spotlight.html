<!-- ── SPOTLIGHT QUICK SEARCH OVERLAY ── -->
<div class="spotlight-overlay" id="spotlight-overlay">
    <div class="spotlight">
        <div class="spotlight-search-bar">
            <i class="hgi-stroke hgi-search-01 spotlight-icon"></i>
            <input type="text" id="spotlight-input" placeholder="Search apps, files, or settings..." autocomplete="off">
            <span class="spotlight-esc-hint">ESC</span>
        </div>
        <ul class="spotlight-results" id="spotlight-results">
            <!-- Dynamically populated -->
        </ul>
    </div>
</div>
