<!-- ── TOP BAR ── -->
<header class="topbar">
    <div class="topbar-left">
        <div class="topbar-logo" id="logo-trigger" title="Launch Menu">
            <span class="topbar-logo-icon"><i class="hgi-stroke hgi-ai-brain-01"></i></span>
            <span class="topbar-logo-text">AIOS</span>
        </div>
        <nav class="topbar-menu">
            <span class="topbar-menu-item">File</span>
            <span class="topbar-menu-item">Edit</span>
            <span class="topbar-menu-item">View</span>
            <span class="topbar-menu-item">Go</span>
            <span class="topbar-menu-item">Window</span>
            <span class="topbar-menu-item">Help</span>
        </nav>
    </div>

    <div class="topbar-center">
        <div class="topbar-search-pill" id="topbar-search-trigger" title="Search System (⌘K)">
            <i class="hgi-stroke hgi-search-01"></i>
            <span>Search anything...</span>
            <span class="search-shortcut">⌘K</span>
        </div>
    </div>

    <div class="topbar-right">
        <div class="topbar-right-icon" id="topbar-bell" title="Notifications">
            <i class="hgi-stroke hgi-notification-01"></i>
        </div>
        <div class="topbar-right-icon" id="topbar-wifi" title="Wi-Fi">
            <i class="hgi-stroke hgi-wifi-01"></i>
        </div>
        <div class="topbar-right-icon" id="control-center-trigger" title="Sound & Control Center">
            <i class="hgi-stroke hgi-volume-high"></i>
        </div>
        <div class="topbar-battery" title="Battery: 100%">
            <i class="hgi-stroke hgi-battery-charge"></i>
            <span>100%</span>
        </div>
        <span class="topbar-clock" id="topbar-clock">Mon, Jun 8 • 08:25 PM</span>
        <div class="topbar-theme-toggle" id="topbar-theme-toggle" title="Toggle Light/Dark Theme">
            <i class="hgi-stroke hgi-sun-01" id="theme-toggle-icon"></i>
        </div>
        <div class="topbar-avatar" id="avatar-trigger" title="Profile Details">
            <div class="avatar-circle"></div>
        </div>
    </div>
</header>
