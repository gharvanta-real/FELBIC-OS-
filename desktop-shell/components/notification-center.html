<!-- ── NOTIFICATION CENTER SIDEBAR ── -->
<div class="notification-center" id="notification-center">
    <div class="nc-header">
        <span class="nc-header-title">Notification Center</span>
        <button class="nc-close-btn" id="nc-close-btn" title="Close">
            <i class="hgi-stroke hgi-cancel-01"></i>
        </button>
    </div>
    
    <div class="nc-content">
        <!-- Section: Notifications Log -->
        <section class="nc-section">
            <div class="nc-section-header">
                <span class="nc-section-title">Notifications</span>
                <button class="nc-action-btn" id="nc-clear-all">Clear All</button>
            </div>
            <div class="nc-list" id="nc-notifications-list">
                <!-- Dynamically loaded notification cards -->
            </div>
        </section>
        
        <!-- Section: Dynamic Widgets -->
        <section class="nc-section">
            <div class="nc-section-header">
                <span class="nc-section-title">Widgets</span>
            </div>
            <div class="nc-widgets-stack" id="nc-widgets-list">
                <!-- Weather, Calendar, Stats, and Notepad widgets nested here -->
            </div>
        </section>
    </div>
</div>
