<!-- ── BOTTOM DOCK ── -->
<div class="dock-container">
    <div class="dock">
        <div class="dock-item dock-launchpad" data-app="launchpad" title="App Drawer">
            <i class="hgi-stroke hgi-grid-view"></i>
        </div>
        <div class="dock-item dock-files" data-app="files" title="Files Explorer">
            <i class="hgi-stroke hgi-folder-open"></i>
        </div>
        <div class="dock-item dock-browser" data-app="browser" title="Web Browser">
            <i class="hgi-stroke hgi-compass"></i>
        </div>
        <div class="dock-item dock-software" data-app="software" title="Software Center">
            <i class="hgi-stroke hgi-app-store"></i>
        </div>
        <div class="dock-item dock-terminal" data-app="terminal" title="Terminal Console">
            <i class="hgi-stroke hgi-command-line"></i>
        </div>
        <div class="dock-item dock-monitor" data-app="monitor" title="Task Manager">
            <i class="hgi-stroke hgi-activity-01"></i>
        </div>
        <div class="dock-item dock-settings" data-app="settings" title="System Settings">
            <i class="hgi-stroke hgi-settings-01"></i>
        </div>
        
        <div class="dock-separator"></div>
        
        <div class="dock-item dock-installer" data-app="installer" title="Install System">
            <i class="hgi-stroke hgi-download-01"></i>
        </div>
        
        <div class="dock-separator"></div>
        
        <div class="dock-item dock-trash" data-app="trash" title="Trash">
            <i class="hgi-stroke hgi-delete-02"></i>
        </div>
    </div>
</div>
